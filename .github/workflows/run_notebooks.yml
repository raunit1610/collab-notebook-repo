name: Run Colab Notebook

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install nbconvert notebook

    - name: Run notebook
      run: |
        jupyter nbconvert --to notebook --execute IPL_Data_Fetch_(API's).ipynb --output executed_ipl.ipynb
